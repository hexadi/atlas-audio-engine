<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atlas Visual Output</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fbff;
      --muted: rgba(248, 251, 255, 0.68);
      --glow: rgba(90, 220, 255, 0.36);
      --pulse: rgba(124, 255, 191, 0.4);
      --safe-x: clamp(20px, 7vw, 96px);
      --safe-y: clamp(24px, 7vh, 84px);
      --progress-bottom: clamp(24px, 6vw, 72px);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      font-family: "Bahnschrift", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(124, 255, 191, 0.20), transparent 28%),
        radial-gradient(circle at 82% 22%, rgba(110, 214, 255, 0.24), transparent 30%),
        linear-gradient(135deg, #030712 0%, #0b1730 48%, #02040a 100%);
    }

    .backdrop {
      position: fixed;
      inset: -8%;
      background-image: var(--artwork);
      background-size: cover;
      background-position: center;
      filter: blur(48px) saturate(1.35);
      opacity: 0.28;
      transform: scale(1.1);
    }

    .stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      grid-template-columns: minmax(220px, min(38vw, 520px)) minmax(0, 1fr);
      gap: clamp(24px, 5vw, 80px);
      align-items: center;
      padding: var(--safe-y) var(--safe-x) calc(var(--safe-y) + 58px);
    }

    .art-frame {
      width: min(100%, 520px);
      justify-self: center;
      aspect-ratio: 1;
      border-radius: clamp(26px, 4vw, 42px);
      padding: clamp(10px, 1.4vw, 16px);
      background: linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0.04));
      box-shadow: 0 32px 90px rgba(0,0,0,0.45), 0 0 80px var(--glow);
    }

    .art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: clamp(18px, 3vw, 30px);
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.24), transparent 34%),
        linear-gradient(135deg, rgba(110,214,255,0.44), rgba(124,255,191,0.18));
    }

    .copy {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: clamp(16px, 1.6vw, 28px);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .title {
      margin: 0;
      font-size: clamp(42px, 8vw, 148px);
      line-height: 0.92;
      letter-spacing: -0.055em;
      overflow-wrap: anywhere;
      text-wrap: balance;
      text-shadow: 0 18px 52px rgba(0,0,0,0.45);
    }

    .artist {
      margin: 26px 0 0;
      color: var(--muted);
      font-size: clamp(28px, 3vw, 58px);
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .next {
      margin-top: clamp(28px, 5vw, 56px);
      padding: clamp(14px, 2vw, 18px) clamp(18px, 2.5vw, 24px);
      width: fit-content;
      max-width: 100%;
      border-radius: 999px;
      color: rgba(255,255,255,0.82);
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: clamp(16px, 1.5vw, 26px);
    }

    .progress {
      position: fixed;
      left: var(--safe-x);
      right: var(--safe-x);
      bottom: var(--progress-bottom);
      z-index: 2;
      height: clamp(10px, 1.5vw, 16px);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6ed6ff, #7cffbf);
      box-shadow: 0 0 28px var(--pulse);
      transition: width 0.35s linear;
    }

    .clock {
      position: fixed;
      right: var(--safe-x);
      bottom: calc(var(--progress-bottom) + 30px);
      z-index: 2;
      color: var(--muted);
      font-size: clamp(14px, 1.4vw, 24px);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 980px) {
      .stage {
        grid-template-columns: minmax(200px, 34vw) minmax(0, 1fr);
      }

      .title {
        font-size: clamp(40px, 7vw, 96px);
      }

      .artist {
        font-size: clamp(24px, 3.5vw, 42px);
      }
    }

    @media (max-width: 760px) {
      :root {
        --safe-x: 22px;
        --safe-y: 28px;
        --progress-bottom: 28px;
      }

      body {
        overflow: auto;
      }

      .stage {
        grid-template-columns: 1fr;
        align-content: start;
        justify-items: center;
        gap: 28px;
        padding: var(--safe-y) var(--safe-x) 96px;
        text-align: center;
      }

      .art-frame {
        width: min(62vw, 320px);
      }

      .eyebrow {
        margin-bottom: 14px;
        font-size: clamp(13px, 3.8vw, 16px);
      }

      .title {
        font-size: clamp(34px, 12vw, 64px);
        line-height: 0.98;
        letter-spacing: -0.045em;
      }

      .artist {
        margin-top: 16px;
        font-size: clamp(20px, 7vw, 34px);
      }

      .next {
        width: 100%;
        margin: 28px auto 0;
        border-radius: 24px;
        font-size: clamp(14px, 4vw, 18px);
      }

      .clock {
        left: var(--safe-x);
        right: var(--safe-x);
        bottom: calc(var(--progress-bottom) + 22px);
        text-align: center;
      }
    }

    @media (max-height: 620px) and (orientation: landscape) {
      :root {
        --safe-x: 40px;
        --safe-y: 28px;
        --progress-bottom: 22px;
      }

      .stage {
        grid-template-columns: minmax(160px, 30vh) minmax(0, 1fr);
        gap: 32px;
        padding: var(--safe-y) var(--safe-x) 68px;
        text-align: left;
      }

      .art-frame {
        width: min(30vh, 240px);
      }

      .eyebrow {
        margin-bottom: 10px;
      }

      .title {
        font-size: clamp(36px, 8vh, 72px);
      }

      .artist {
        margin-top: 12px;
        font-size: clamp(20px, 4.5vh, 34px);
      }

      .next {
        margin-top: 20px;
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <div id="backdrop" class="backdrop"></div>
  <main class="stage">
    <div class="art-frame">
      <img id="art" class="art" alt="">
    </div>
    <section class="copy">
      <p class="eyebrow">Atlas Audio Engine</p>
      <h1 id="title" class="title">Loading...</h1>
      <p id="artist" class="artist">Connecting to live channel</p>
      <div id="next" class="next">Next: loading...</div>
    </section>
  </main>
  <div id="clock" class="clock">0:00 / 0:00</div>
  <div class="progress" aria-hidden="true"><div id="fill" class="fill"></div></div>

  <script>
    const elements = {
      art: document.getElementById('art'),
      artist: document.getElementById('artist'),
      backdrop: document.getElementById('backdrop'),
      clock: document.getElementById('clock'),
      fill: document.getElementById('fill'),
      next: document.getElementById('next'),
      title: document.getElementById('title'),
    };

    let channelId = null;
    let snapshot = null;
    let displayed = { artworkUrl: null, title: null, artist: null };

    function formatTime(ms) {
      const totalSeconds = Math.max(0, Math.floor((ms || 0) / 1000));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return minutes + ':' + String(seconds).padStart(2, '0');
    }

    async function loadChannelId() {
      const response = await fetch('/channels');
      if (!response.ok) throw new Error('Unable to load channels');
      const channels = await response.json();
      if (!Array.isArray(channels) || channels.length === 0) throw new Error('No channels available');
      return channels[0].id;
    }

    async function refreshState() {
      if (!channelId) channelId = await loadChannelId();
      const response = await fetch('/channels/' + encodeURIComponent(channelId) + '/state');
      if (!response.ok) throw new Error('Unable to load state');
      snapshot = await response.json();
      render();
    }

    function connectSocket() {
      if (!channelId || !window.WebSocket) return;
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const socket = new WebSocket(protocol + '//' + window.location.host + '/channels/' + encodeURIComponent(channelId) + '/ws');
      socket.addEventListener('message', (event) => {
        const nextSnapshot = JSON.parse(event.data);
        if (!nextSnapshot.error) {
          snapshot = nextSnapshot;
          render();
        }
      });
      socket.addEventListener('close', () => setTimeout(connectSocket, 3000));
    }

    function render() {
      if (!snapshot) return;
      const now = snapshot.now_playing || {};
      const title = now.title || 'Nothing playing';
      const artist = now.artist || 'Unknown artist';
      const artworkUrl = now.artwork_url || '';

      if (displayed.title !== title) {
        elements.title.textContent = title;
        displayed.title = title;
      }
      if (displayed.artist !== artist) {
        elements.artist.textContent = artist;
        displayed.artist = artist;
      }
      if (displayed.artworkUrl !== artworkUrl) {
        if (artworkUrl) {
          elements.art.src = artworkUrl;
          elements.backdrop.style.setProperty('--artwork', 'url("' + artworkUrl + '")');
        } else {
          elements.art.removeAttribute('src');
          elements.backdrop.style.removeProperty('--artwork');
        }
        displayed.artworkUrl = artworkUrl;
      }

      if (snapshot.next_track) {
        elements.next.textContent = 'Next: ' + (snapshot.next_track.title || 'Unknown track') + ' - ' + (snapshot.next_track.artist || 'Unknown artist');
      } else {
        elements.next.textContent = 'Next: playlist unavailable';
      }

      renderProgress();
    }

    function renderProgress() {
      if (!snapshot) return;
      const now = snapshot.now_playing || {};
      const startedAt = now.started_at ? new Date(now.started_at).getTime() : Date.now();
      const duration = now.duration_ms || 0;
      const elapsed = Math.min(duration, Math.max(0, Date.now() - startedAt));
      const progress = duration > 0 ? (elapsed / duration) * 100 : 0;
      elements.fill.style.width = progress + '%';
      elements.clock.textContent = formatTime(elapsed) + ' / ' + formatTime(duration);
    }

    refreshState()
      .then(connectSocket)
      .catch(() => {
        elements.title.textContent = 'Offline';
        elements.artist.textContent = 'Waiting for Atlas Audio Engine';
      });
    setInterval(renderProgress, 250);
    setInterval(() => {
      if (!snapshot) refreshState().catch(() => {});
    }, 5000);
  </script>
</body>
</html>
